<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toques de corneta</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"></noscript>
</head>
<body>

  <div class="app">
    
    <header>
      <h1>QUIZ - Toques de corneta </h1>
    </header>

    <main id="conteudo"></main>

    <nav class="bottom-nav" role="navigation" aria-label="Menu principal">
      <button data-aba="lista" onclick="navegarPara(mostrarLista)">
        <span class="nav-icon"><i data-lucide="music-2"></i></span>
        <span class="nav-label">Toques</span>
      </button>
      <button data-aba="simulado" onclick="navegarPara(mostrarSimulado)">
        <span class="nav-icon"><i data-lucide="clipboard-list"></i></span>
        <span class="nav-label">Simulado</span>
      </button>
      <button data-aba="info" onclick="navegarPara(mostrarInfo)">
        <span class="nav-icon"><i data-lucide="info"></i></span>
        <span class="nav-label">Informações</span>
      </button>
    </nav>

  </div>

  <div id="installToast" class="install-toast hidden">
  <div class="toast-content">
    <div>
      <strong>Instale como app</strong>
      <p>Use como se fosse um aplicativo no celular.</p>
    </div>
    <div class="toast-buttons">
      <button id="btnInstall">Instalar</button>
      <button id="btnClose">Agora não</button>
    </div>
  </div>
</div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
