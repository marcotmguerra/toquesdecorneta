name: toques_de_corneta
description: "Toques de Corneta — app de treino para o Pelotão Delta CEFS 2026"
publish_to: 'none'
version: 2.7.3+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  audioplayers: ^6.1.0
  shared_preferences: ^2.3.5
  provider: ^6.1.2
  confetti: ^0.7.0
  vibration: ^2.0.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/audios/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#121214"
  adaptive_icon_foreground: "assets/images/icon.png"
  min_sdk_android: 21
